  <circle cx="50" cy="55" r="10" fill="url(#synth-grad)" />
  <!-- Neural connections connecting the core to the forge -->
  <path d="M50 55 L50 25 M25 70 L50 55 M75 70 L50 55" stroke="url(#synth-grad)" stroke-width="4" stroke-linecap="round"/>
</svg>