<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="synth-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
  </defs>
  <!-- Outer structural hexagon (The Forge) -->
  <path d="M50 5 L90 27 L90 73 L50 95 L10 73 L10 27 Z" fill="none" stroke="url(#synth-grad)" stroke-width="8" stroke-linejoin="round"/>
